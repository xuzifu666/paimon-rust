name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate .asf.yaml
        run: python3 scripts/validate_asf_yaml.py

      - name: Check License Header
        uses: apache/skywalking-eyes/header@v0.8.0

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.14.22

      - name: Check dependency licenses (Apache-compatible)
        run: cargo deny check licenses

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: cargo build

  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test
        run: cargo test -p paimon --all-targets
        env:
          RUST_LOG: DEBUG
          RUST_BACKTRACE: full

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Start Docker containers
        run: make docker-up

      - name: Rust Integration Test
        run: cargo test -p paimon-integration-tests --all-targets
        env:
          RUST_LOG: DEBUG
          RUST_BACKTRACE: full

      - name: DataFusion Integration Test
        run: cargo test -p paimon-datafusion --test read_tables
        env:
          RUST_LOG: DEBUG
          RUST_BACKTRACE: full

      - name: Go Integration Test
        working-directory: bindings/go
        run: make test

      - name: Stop Docker containers
        if: always()
        run: make docker-down
